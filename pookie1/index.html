<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PookieCoderLab Cinematic Login</title>
  <style>
    /* ---------- Root Colors & Variables ---------- */
    :root{
      --bg-1:#0b0f14;           /* Deep dark background */
      --bg-2:#0e1a24;           /* Navy tint */
      --neon:#39ff14;           /* Neon green */
      --neon-2:#00e5ff;         /* Neon cyan */
      --text:#e7f2ff;           /* Light text */
      --muted:#94a3b8;          /* Slate gray text */
      --danger:#ff4d6d;         /* Error red */
      --glass:rgba(255,255,255,.06); /* Transparent glass layer */
      --glass-2:rgba(255,255,255,.12); /* Stronger glass layer */
    }

    /* Reset box-sizing */
    *{box-sizing:border-box}
    html,body{height:100%}

    /* ---------- Background & Body ---------- */
    body{
      margin:0; 
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      color:var(--text);
      /* Cinematic gradient background */
      background: radial-gradient(1200px 700px at 20% 10%, #142131 0%, transparent 60%),
                  radial-gradient(1000px 600px at 90% 80%, #111b27 0%, transparent 60%),
                  linear-gradient(180deg, var(--bg-1), var(--bg-2));
      overflow:hidden; /* Prevent scroll */
    }

    /* ---------- Subtle fog/noise effect ---------- */
    .grain{
      position:fixed; inset:0; pointer-events:none; opacity:.07; mix-blend-mode:overlay;
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.25"/></svg>');
      animation: grain 8s steps(6) infinite;
    }
    @keyframes grain { 0%{transform:translate(0,0)} 100%{transform:translate(-160px,-160px)} }

    /* ---------- Main scene ---------- */
    .scene{
      position:relative; height:100dvh; display:grid; place-items:center; padding:24px;
    }

    /* ---------- Login Card ---------- */
    .card{
      width:min(92vw, 880px); min-height:480px; position:relative; border-radius:20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      box-shadow: 0 40px 100px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.06);
      overflow:hidden;
    }

    /* Neon glow edges */
    .card::before{
      content:""; position:absolute; inset:0; pointer-events:none; border-radius:20px;
      background: radial-gradient(600px 200px at 10% 0%, rgba(0,229,255,.28), transparent 60%),
                  radial-gradient(600px 200px at 90% 100%, rgba(57,255,20,.28), transparent 60%);
    }

    /* Split into two columns (left characters, right form) */
    .grid{ display:grid; grid-template-columns: 1.1fr .9fr; height:100%; }

    /* ---------- Left panel (Stage for avatars + bow) ---------- */
    .stage{ position:relative; padding:28px; background:linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.36));}

    /* Ground line under avatars */
    .ground{ position:absolute; left:0; right:0; bottom:42px; height:2px; background:linear-gradient(90deg, transparent, var(--glass-2), transparent); }

    /* Floating text chips carried by avatars */
    .label-chip{ position:absolute; top:20%; left:50%; transform:translate(-50%, -50%) scale(.9); opacity:0;
      background:rgba(0,0,0,.45); border:1px solid rgba(255,255,255,.12); color:var(--text);
      padding:8px 12px; border-radius:999px; text-transform:uppercase; letter-spacing:1px; font-size:.78rem;
      box-shadow: 0 0 0 2px rgba(0,229,255,.06), 0 12px 30px rgba(0,0,0,.5);
    }

    /* Simple avatars */
    .avatar{ position:absolute; bottom:42px; width:160px; height:200px; filter:drop-shadow(0 10px 20px rgba(0,0,0,.5)); }
    .boy { left:-220px; }
    .girl{ right:-220px; }

    /* ---------- Bow decoration ---------- */
    .bow{
      position:absolute;
      top:10px; right:10px;   /* Position at top-right of login card */
      font-size:50px;         /* Size of bow */
      z-index:20;             /* Above everything */
    }

    /* ---------- Right panel (Login form) ---------- */
    .panel{ position:relative; display:grid; align-content:center; gap:22px; padding:48px; }
    .title{ font-size:clamp(20px, 2.6vw, 28px); letter-spacing:.6px; }
    .subtitle{ color:var(--muted); font-size:14px; margin-top:-8px; }

    .field{ display:grid; gap:8px; }
    label{ font-size:12px; letter-spacing:.8px; text-transform:uppercase; color:var(--muted); }
    .input{
      background:rgba(255,255,255,.05); color:var(--text);
      border:1px solid rgba(255,255,255,.12); padding:12px 14px; border-radius:12px; outline:none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .input:focus{
      border-color: var(--neon-2); box-shadow: 0 0 0 4px rgba(0,229,255,.15), 0 12px 40px rgba(0,229,255,.12);
      background:rgba(0,229,255,.06);
    }

    .btn{
      cursor:pointer; border:none; padding:12px 16px; border-radius:12px; font-weight:700;
      background:linear-gradient(90deg, var(--neon-2), var(--neon)); color:#00151c; letter-spacing:.4px;
      box-shadow: 0 12px 40px rgba(0,229,255,.22), 0 6px 22px rgba(57,255,20,.18);
      transition: transform .12s ease, box-shadow .2s ease; 
    }
    .btn:active{ transform: translateY(1px) scale(.99); }

    .hint{ font-size:12px; color:var(--muted); }
    .error{ display:none; color:var(--danger); font-size:12px; }

    /* ---------- Animations ---------- */
    .reveal { opacity:0; transform:translateY(8px); animation: fadeInUp .8s .6s forwards; }
    @keyframes fadeInUp{ to{opacity:1; transform:none} }

    /* Boy avatar entrance */
    .boy{ animation: boyEnter 1.6s .2s ease-out forwards; }
    @keyframes boyEnter{ 0%{ transform: translateX(0)} 100%{ transform: translateX(240px)} }

    /* Girl avatar entrance */
    .girl{ animation: girlEnter 1.6s .2s ease-out forwards; }
    @keyframes girlEnter{ 0%{ transform: translateX(0)} 100%{ transform: translateX(-240px)} }

    /* Chips pop animation */
    .chip-user{ top:32%; left:34%; animation: chipPop 1s 1.3s ease-out forwards; }
    .chip-pass{ top:46%; left:66%; animation: chipPop 1s 1.5s ease-out forwards; }
    @keyframes chipPop{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.8)} 100%{opacity:1; transform:translate(-50%,-50%) scale(1)} }

    /* Arms pointing gesture */
    .point-left { animation: pointL 1.2s 2.2s ease-in-out 2 alternate; transform-origin: 140px 130px; }
    .point-right{ animation: pointR 1.2s 2.2s ease-in-out 2 alternate; transform-origin: 20px 130px; }
    @keyframes pointL{ from{ transform: rotate(0deg)} to{ transform: rotate(-16deg)} }
    @keyframes pointR{ from{ transform: rotate(0deg)} to{ transform: rotate(16deg)} }

    /* Responsive tweaks */
    @media (max-width: 880px){
      .grid{ grid-template-columns: 1fr; }
      .stage{ height: 260px; }
      .panel{ padding: 24px 22px 40px; }
      .boy{ transform: translateX(220px) scale(.9); }
      .girl{ transform: translateX(-220px) scale(.9); }
      .chip-user{ left:28% }
      .chip-pass{ left:72% }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="card">
      
      <!-- 🎀 Bow Decoration -->
      <div class="bow">🎀</div>

      <div class="grid">
        <!-- Left: Cinematic characters -->
        <div class="stage">
          <div class="ground"></div>

          <!-- floating chips carried in by avatars -->
          <span class="label-chip chip-user">USERNAME</span>
          <span class="label-chip chip-pass">PASSWORD</span>

          <!-- BOY Avatar (left) -->
          <svg class="avatar boy" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- head + body -->
            <circle cx="80" cy="50" r="26" fill="#0de7ff" opacity="0.9"/>
            <rect x="52" y="76" width="56" height="70" rx="12" fill="#093544"/>
            <!-- left arm pointing -->
            <g class="point-left">
              <rect x="10" y="100" width="60" height="10" rx="5" fill="#0de7ff"/>
              <circle cx="10" cy="105" r="6" fill="#0de7ff"/>
            </g>
            <!-- right arm -->
            <rect x="90" y="100" width="60" height="10" rx="5" fill="#0de7ff"/>
            <!-- legs -->
            <rect x="58" y="146" width="16" height="36" rx="6" fill="#0de7ff"/>
            <rect x="86" y="146" width="16" height="36" rx="6" fill="#0de7ff"/>
          </svg>

          <!-- GIRL Avatar (right) -->
          <svg class="avatar girl" viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <!-- head + hair -->
            <circle cx="80" cy="50" r="26" fill="#7dfb3a" opacity="0.95"/>
            <path d="M54,52 q26,-36 52,0 v12 h-52z" fill="#1c2e1f" opacity=".8"/>
            <rect x="52" y="76" width="56" height="70" rx="12" fill="#102b16"/>
            <!-- right arm pointing -->
            <g class="point-right">
              <rect x="90" y="100" width="60" height="10" rx="5" fill="#7dfb3a"/>
              <circle cx="150" cy="105" r="6" fill="#7dfb3a"/>
            </g>
            <!-- left arm -->
            <rect x="10" y="100" width="60" height="10" rx="5" fill="#7dfb3a"/>
            <!-- legs -->
            <rect x="58" y="146" width="16" height="36" rx="6" fill="#7dfb3a"/>
            <rect x="86" y="146" width="16" height="36" rx="6" fill="#7dfb3a"/>
          </svg>
        </div>

        <!-- Right: Login form -->
        <form class="panel" id="login-form" autocomplete="off">
          <div>
            <div class="title">PookieCoderLab</div>
            <br>
            <div class="subtitle">Fun Coding & Mini Projects — cinematic login demo</div>
          </div>

          <div class="field reveal">
            <label for="user">Username</label>
            <input id="user" class="input" name="user" placeholder="e.g. pookie" required />
          </div>

          <div class="field reveal" style="animation-delay:.75s">
            <label for="pass">Password</label>
            <input id="pass" class="input" type="password" name="pass" placeholder="••••••••" required />
          </div>

          <div class="error" id="error">Wrong username or password — try again.</div>

          <button class="btn reveal" style="animation-delay:1.1s">Login</button>
          <div class="hint">Tip: Press Enter to submit • DLT to clear</div>
        </form>
      </div>
    </div>
  </div>

  <!-- Grain overlay for cinematic effect -->
  <div class="grain"></div>

  <script>
    const form = document.getElementById('login-form');
    const err  = document.getElementById('error');
    const user = document.getElementById('user');
    const pass = document.getElementById('pass');

    // Simple demo validation (replace with real auth)
    form.addEventListener('submit', (e)=>{
      e.preventDefault();
      const u = user.value.trim();
      const p = pass.value.trim();

      if(u && p){
        // Success pulse animation
        form.classList.add('ok');
        err.style.display='none';
        pulse();
        // Fake success
        setTimeout(()=>{
          alert('Welcome, ' + u + '! (Demo)');
          user.value=''; pass.value='';
        }, 600);
      }else{
        err.style.display='block';
        shake(form);
      }
    });

    // Keyboard shortcut: ESC to clear
    window.addEventListener('keydown', (e)=>{
      if(e.key==='Escape'){ user.value=''; pass.value=''; err.style.display='none'; }
    });

    // Success pulse effect
    function pulse(){
      form.animate([
        {boxShadow:'0 0 0 0 rgba(0,229,255,.0)'},
        {boxShadow:'0 0 0 8px rgba(0,229,255,.18)'}
      ], {duration:320, iterations:1});
    }
    // Shake effect for error
    function shake(el){
      el.animate([
        {transform:'translateX(0)'},
        {transform:'translateX(-6px)'},
        {transform:'translateX(6px)'},
        {transform:'translateX(0)'}
      ], {duration:220, iterations:1});
    }
  </script>
</body>
</html>
